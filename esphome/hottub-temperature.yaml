# ============================================================
# Hot Tub Temperature + OLED + Touch Sensor — ESPHome Config
# Hardware: Wemos D1 Mini + DS18B20 + SSD1309 2.42" OLED + TTP223 Touch
#
# WIRING:
#   DS18B20:     VCC→3.3V  GND→GND  DATA→D5  (+2.35kΩ pull-up to 3.3V)
#   SSD1309:     VCC→3.3V  GND→GND  SDA→D2   SCL→D1
#   Touch (TTP223): VCC→3.3V  GND→GND  SIG→D6
#
# GPIO MAP (silkscreen → GPIO):
#   D1 = GPIO5  (I2C SCL)
#   D2 = GPIO4  (I2C SDA)
#   D5 = GPIO14 (DS18B20 data)
#   D6 = GPIO12 (touch sensor signal)
#   D7 = GPIO13 (spare)
#
# DISPLAY MODES:
#   STANDBY  — water temperature centred, fills screen
#   OVERRIDE — HH:MM:SS countdown centred, fills screen
#
# OVERRIDE LOGIC:
#   Tap 1: 0  → 30 min (1800s)
#   Tap 2: 30 → 60 min (3600s)
#   Tap 3: 60 → 90 min (5400s) — maximum
#   Tap 4: CANCEL — resets to 0, reverts to standby
#   Auto-expires when countdown reaches 0
#
# COSY TARIFF WINDOWS (Octopus Cosy):
#   CHEAP  : 04:00–07:00  |  13:00–16:00  |  22:00–00:00
#   PEAK   : 16:00–19:00  (tub blocked in HA automation)
#   STANDARD: all other times
# ============================================================

esphome:
  name: hottub-temperature
  friendly_name: Hottub Temperature

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  manual_ip:
    static_ip: 192.168.0.38
    gateway: 192.168.0.1
    subnet: 255.255.0.0
  ap:
    ssid: "Hottub Fallback"
    password: "fallbackpass"

captive_portal:
logger:
api:
ota:
  platform: esphome
  password: "e5265aaa098ec02bdeb7155d0a2dc7bc"

# ── Time (from Home Assistant) ────────────────────────────────────────────────
time:
  - platform: homeassistant
    id: ha_time

# ── I2C for SSD1309 OLED (D1=SCL, D2=SDA) ────────────────────────────────────
i2c:
  sda: GPIO4   # D2
  scl: GPIO5   # D1
  scan: true
  id: bus_a
  frequency: 400kHz

# ── DS18B20 OneWire on D5 ─────────────────────────────────────────────────────
one_wire:
  - platform: gpio
    pin:
      number: GPIO14  # D5
      mode:
        input: true
        pullup: true

# ── Globals ───────────────────────────────────────────────────────────────────
globals:
  - id: override_seconds
    type: int
    restore_value: false
    initial_value: '0'
  - id: tap_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: override_was_active
    type: bool
    restore_value: false
    initial_value: 'false'

# ── Temperature Sensor ────────────────────────────────────────────────────────
sensor:
  - platform: dallas_temp
    name: "Temperature"
    id: hottub_temp
    update_interval: 30s
    filters:
      - lambda: |-
          if (x < 5.0f || x > 60.0f) return {};
          return x;

  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_db
    update_interval: 60s

# ── Touch Sensor on D6 (GPIO12) ───────────────────────────────────────────────
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO12  # D6
      mode: INPUT
      inverted: true
    name: "Touch Sensor"
    id: touch_button
    filters:
      - delayed_on: 20ms
      - delayed_off: 200ms
    on_press:
      then:
        - lambda: |-
            const int INCREMENT = 1800;
            const int MAX_TAPS  = 3;
            const int MAX_SECS  = INCREMENT * MAX_TAPS;

            bool was_active = (id(override_seconds) > 0);

            if (was_active) {
              if (id(tap_count) >= MAX_TAPS) {
                id(override_seconds) = 0;
                id(tap_count) = 0;
              } else {
                id(override_seconds) += INCREMENT;
                if (id(override_seconds) > MAX_SECS) id(override_seconds) = MAX_SECS;
                id(tap_count) += 1;
              }
            } else {
              id(override_seconds) = INCREMENT;
              id(tap_count) = 1;
            }

  - platform: template
    name: "Override Active"
    id: override_active_sensor
    lambda: 'return id(override_seconds) > 0;'

# ── Countdown: decrement every second while active ────────────────────────────
interval:
  - interval: 1s
    then:
      - lambda: |-
          bool was_active = id(override_was_active);
          bool is_active  = (id(override_seconds) > 0);

          if (is_active) {
            id(override_seconds) -= 1;
            if (id(override_seconds) == 0) {
              id(tap_count) = 0;
            }
          }

          if (was_active && id(override_seconds) == 0) {
            id(override_was_active) = false;
          } else if (is_active) {
            id(override_was_active) = true;
          }

# ── Fonts ─────────────────────────────────────────────────────────────────────
# ConsiderMeVexed by Chequered Ink — not on Google Fonts, must be local.
# Download from https://www.fontspace.com/considermevexed-font-f19295
# Place the .ttf file at: /config/esphome/fonts/ConsidermevexedRegular-ExLe.ttf
font:
  - file: "fonts/ConsidermevexedRegular-ExLe.ttf"
    id: font_large   # Override countdown
    size: 39
  - file: "fonts/ConsidermevexedRegular-ExLe.ttf"
    id: font_temp    # Standby temperature
    size: 58

# ── SSD1309 Display ───────────────────────────────────────────────────────────
# Note: SSD1309 uses the SSD1306 driver in ESPHome.
# If display is blank: try address 0x3D, check i2c scan log.
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled_display
    update_interval: 1s
    lambda: |-
      it.fill(COLOR_OFF);

      if (id(override_seconds) > 0) {
        // ── OVERRIDE: HH:MM:SS fills screen ──────────────────
        // Each character printed at a fixed x slot so digit-width
        // variation never shifts the string left/right.
        // 8 chars across 128px → 16px per slot, centres at 8,24,40…120
        int total = id(override_seconds);
        int h   = total / 3600;
        int m   = (total % 3600) / 60;
        int sec = total % 60;
        char buf[12];
        snprintf(buf, sizeof(buf), "%02d:%02d:%02d", h, m, sec);
        int slots[8] = {8, 24, 40, 56, 72, 88, 104, 120};
        for (int i = 0; i < 8; i++) {
          char ch[2] = {buf[i], '\0'};
          it.print(slots[i], 32, id(font_large), TextAlign::CENTER, ch);
        }

      } else {
        // ── STANDBY: temperature fills screen ────────────────
        char tbuf[10];
        if (id(hottub_temp).has_state()) {
          snprintf(tbuf, sizeof(tbuf), "%.1fC", id(hottub_temp).state);
        } else {
          snprintf(tbuf, sizeof(tbuf), "---C");
        }
        it.print(64, 32, id(font_temp), TextAlign::CENTER, tbuf);
      }
