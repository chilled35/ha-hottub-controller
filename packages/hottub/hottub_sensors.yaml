# ============================================================
# Hot Tub Control — Sensors
# ============================================================

template:
  - sensor:

      # ── TEMPERATURE ──────────────────────────────────────
      - name: "Hot Tub Temperature"
        unique_id: hottub_temperature_active
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        icon: mdi:thermometer-water
        state: >
          {% set real = states('sensor.hottub_temp_sensor_hot_tub_temperature') %}
          {% if real not in ['unknown', 'unavailable'] %}
            {{ real | float | round(1) }}
          {% else %}
            {{ states('input_number.hottub_temp_placeholder') | float | round(1) }}
          {% endif %}
        attributes:
          source: >
            {% if states('sensor.hottub_temp_sensor_hot_tub_temperature')
                  not in ['unknown', 'unavailable'] %}DS18B20
            {% else %}Placeholder{% endif %}

      # ── ELECTRICITY RATE ─────────────────────────────────
      - name: "Hot Tub Electricity Rate"
        unique_id: hottub_electricity_rate
        unit_of_measurement: "p/kWh"
        icon: mdi:lightning-bolt-circle
        state: >
          {% set h = now().hour %}
          {% if h >= 16 and h < 19 %}
            {{ states('input_number.hottub_rate_peak') | float(38) }}
          {% elif (h >= 4 and h < 7) or (h >= 13 and h < 16) or h >= 22 %}
            {{ states('input_number.hottub_rate_cheap') | float(12) }}
          {% else %}
            {{ states('input_number.hottub_rate_standard') | float(24) }}
          {% endif %}
        attributes:
          period: >
            {% set h = now().hour %}
            {% if h >= 16 and h < 19 %}peak
            {% elif (h >= 4 and h < 7) or (h >= 13 and h < 16) or h >= 22 %}cheap
            {% else %}standard{% endif %}
          next_change: >
            {% set h = now().hour %}
            {% if h < 4 %}04:00 — Cheap starts
            {% elif h < 7 %}07:00 — Cheap ends
            {% elif h < 13 %}13:00 — Cheap starts
            {% elif h < 16 %}16:00 — Peak starts ⚠️
            {% elif h < 19 %}19:00 — Peak ends
            {% elif h < 22 %}22:00 — Cheap starts
            {% else %}00:00 — Standard starts{% endif %}

      # ── TEMPERATURE STATUS ───────────────────────────────
      - name: "Hot Tub Temp Status"
        unique_id: hottub_temp_status
        icon: mdi:thermometer-check
        state: >
          {% set temp   = states('sensor.hot_tub_temperature') | float(0) %}
          {% set target = states('input_number.hottub_target_temp') | float(38) %}
          {% if temp >= target %}At Temperature
          {% elif temp >= target - 1 %}Nearly There
          {% elif temp >= target - 5 %}Heating
          {% else %}Cold{% endif %}

      # ── TOTAL kWh (raw meter minus period start) ─────────
      - name: "Hot Tub Today kWh"
        unique_id: hottub_today_kwh
        unit_of_measurement: "kWh"
        state_class: measurement
        icon: mdi:lightning-bolt
        state: >
          {% set cur  = states('sensor.appliance_hottub_energy') | float(0) %}
          {% set snap = states('input_number.hottub_kwh_snap_midnight') | float(0) %}
          {{ [cur - snap, 0] | max | round(3) }}

      - name: "Hot Tub Week kWh"
        unique_id: hottub_week_kwh
        unit_of_measurement: "kWh"
        state_class: measurement
        icon: mdi:lightning-bolt
        state: >
          {% set cur  = states('sensor.appliance_hottub_energy') | float(0) %}
          {% set snap = states('input_number.hottub_kwh_snap_week') | float(0) %}
          {{ [cur - snap, 0] | max | round(3) }}

      - name: "Hot Tub Month kWh"
        unique_id: hottub_month_kwh
        unit_of_measurement: "kWh"
        state_class: measurement
        icon: mdi:lightning-bolt
        state: >
          {% set cur  = states('sensor.appliance_hottub_energy') | float(0) %}
          {% set snap = states('input_number.hottub_kwh_snap_month') | float(0) %}
          {{ [cur - snap, 0] | max | round(3) }}

      # ── COST SENSORS (kWh from input_numbers × rates) ────
      # Tariff kWh are computed from recorder every 30 min
      # by the cost calculator automation.
      - name: "Hot Tub Today Cost"
        unique_id: hottub_today_cost
        unit_of_measurement: "p"
        state_class: measurement
        icon: mdi:cash
        state: >
          {% set c  = states('input_number.hottub_today_cheap_kwh')    | float(0) %}
          {% set s  = states('input_number.hottub_today_standard_kwh') | float(0) %}
          {% set p  = states('input_number.hottub_today_peak_kwh')     | float(0) %}
          {% set cr = states('input_number.hottub_rate_cheap')         | float(12) %}
          {% set sr = states('input_number.hottub_rate_standard')      | float(24) %}
          {% set pr = states('input_number.hottub_rate_peak')          | float(38) %}
          {{ ((c * cr) + (s * sr) + (p * pr)) | round(1) }}

      - name: "Hot Tub Week Cost"
        unique_id: hottub_week_cost
        unit_of_measurement: "p"
        state_class: measurement
        icon: mdi:cash
        state: >
          {% set c  = states('input_number.hottub_week_cheap_kwh')    | float(0) %}
          {% set s  = states('input_number.hottub_week_standard_kwh') | float(0) %}
          {% set p  = states('input_number.hottub_week_peak_kwh')     | float(0) %}
          {% set cr = states('input_number.hottub_rate_cheap')        | float(12) %}
          {% set sr = states('input_number.hottub_rate_standard')     | float(24) %}
          {% set pr = states('input_number.hottub_rate_peak')         | float(38) %}
          {{ ((c * cr) + (s * sr) + (p * pr)) | round(1) }}

      - name: "Hot Tub Month Cost"
        unique_id: hottub_month_cost
        unit_of_measurement: "p"
        state_class: measurement
        icon: mdi:cash
        state: >
          {% set c  = states('input_number.hottub_month_cheap_kwh')    | float(0) %}
          {% set s  = states('input_number.hottub_month_standard_kwh') | float(0) %}
          {% set p  = states('input_number.hottub_month_peak_kwh')     | float(0) %}
          {% set cr = states('input_number.hottub_rate_cheap')         | float(12) %}
          {% set sr = states('input_number.hottub_rate_standard')      | float(24) %}
          {% set pr = states('input_number.hottub_rate_peak')          | float(38) %}
          {{ ((c * cr) + (s * sr) + (p * pr)) | round(1) }}

  - binary_sensor:

      - name: "Hot Tub Cheap Rate Active"
        unique_id: hottub_cheap_rate_active
        device_class: power
        icon: mdi:cash-check
        state: >
          {% set h = now().hour %}
          {{ (h >= 4 and h < 7) or (h >= 13 and h < 16) or h >= 22 }}

      - name: "Hot Tub Peak Block Active"
        unique_id: hottub_peak_block_active
        device_class: safety
        icon: mdi:block-helper
        state: >
          {% set h = now().hour %}
          {{ h >= 16 and h < 19 }}

      # ── SOLAR SUFFICIENT ─────────────────────────────────
      # delay_on / delay_off require solar to stay above/below
      # threshold for 2 continuous minutes before flipping —
      # prevents the tub cycling on/off with cloud cover flicker.
      - name: "Hot Tub Solar Sufficient"
        unique_id: hottub_solar_sufficient
        device_class: power
        icon: mdi:solar-power
        state: >
          {% set solar_w   = states('sensor.power_meter') | float(0) * 1000 %}
          {% set threshold = states('input_number.hottub_solar_threshold') | float(2000) %}
          {{ solar_w >= threshold }}
        delay_on:
          minutes: 2
        delay_off:
          minutes: 2

      - name: "Hot Tub Voltage Alert"
        unique_id: hottub_voltage_alert
        device_class: problem
        icon: mdi:lightning-bolt-circle
        state: >
          {% set v = states('sensor.appliance_hottub_voltage') | float(0) %}
          {{ v > 0 and (v < 210 or v > 250) }}
        attributes:
          voltage: "{{ states('sensor.appliance_hottub_voltage') | float(0) }} V"
