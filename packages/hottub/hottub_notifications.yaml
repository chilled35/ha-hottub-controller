# ============================================================
# Hot Tub Control — Push Notifications
# File: packages/hottub/hottub_notifications.yaml
#
# ⚠️  Update notify.mobile_app_jasons_iphone to match your
#     exact device name from Developer Tools → Services.
#
# Notifications:
#   1. Daily 8AM  — yesterday's energy and cost
#   2. Weekly Mon 8AM — week total + cost
#   3. Monthly 1st 8AM — month total + cost
# ============================================================

automation:

  # ══════════════════════════════════════════════════════════
  # 1. DAILY 8AM REPORT
  # ══════════════════════════════════════════════════════════
  - id: hottub_notify_daily
    alias: "Hot Tub — Daily Report (8AM)"
    trigger:
      - platform: time
        at: "08:00:00"
    action:
      - service: notify.mobile_app_jasons_iphone
        data:
          title: "Hot Tub — Yesterday's Usage"
          message: >
            Energy: {{ states('input_number.hottub_yesterday_energy') | float(0) | round(2) }} kWh
            Cost: {{ (states('input_number.hottub_yesterday_cost') | float(0) / 100) | round(2) }}p
            Temp: {{ states('sensor.hottub_temperature_temperature') | float(0) | round(1) }}C
          data:
            push:
              sound: default
            url: /local/hottub/dashboard.html
    mode: single

  # ══════════════════════════════════════════════════════════
  # 2. WEEKLY REPORT (Monday 8AM)
  # ══════════════════════════════════════════════════════════
  - id: hottub_notify_weekly
    alias: "Hot Tub — Weekly Report (Mon 8AM)"
    trigger:
      - platform: time
        at: "08:00:00"
    condition:
      - condition: template
        value_template: "{{ now().weekday() == 0 }}"
    action:
      - service: notify.mobile_app_jasons_iphone
        data:
          title: "Hot Tub — Weekly Report"
          message: >
            {% set cheap = states('input_number.hottub_week_cheap_kwh')    | float(0) %}
            {% set std   = states('input_number.hottub_week_standard_kwh') | float(0) %}
            {% set peak  = states('input_number.hottub_week_peak_kwh')     | float(0) %}
            {% set solar = states('input_number.hottub_week_solar_kwh')    | float(0) %}
            {% set total = cheap + std + peak %}
            {% set cost  = states('sensor.hot_tub_week_cost') | float(0) / 100 %}
            Total: {{ total | round(2) }} kWh, GBP{{ cost | round(2) }}
            Cheap: {{ cheap | round(2) }} kWh, Solar: {{ solar | round(2) }} kWh
            Peak: {{ peak | round(2) }} kWh, Standard: {{ std | round(2) }} kWh
          data:
            push:
              sound: default
            url: /local/hottub/dashboard.html
    mode: single

  # ══════════════════════════════════════════════════════════
  # 3. MONTHLY REPORT (1st of month 8AM)
  # ══════════════════════════════════════════════════════════
  - id: hottub_notify_monthly
    alias: "Hot Tub — Monthly Report (1st 8AM)"
    trigger:
      - platform: time
        at: "08:00:00"
    condition:
      - condition: template
        value_template: "{{ now().day == 1 }}"
    action:
      - service: notify.mobile_app_jasons_iphone
        data:
          title: "Hot Tub — Monthly Report"
          message: >
            {% set cheap = states('input_number.hottub_month_cheap_kwh')    | float(0) %}
            {% set std   = states('input_number.hottub_month_standard_kwh') | float(0) %}
            {% set peak  = states('input_number.hottub_month_peak_kwh')     | float(0) %}
            {% set solar = states('input_number.hottub_month_solar_kwh')    | float(0) %}
            {% set total = cheap + std + peak %}
            {% set cost  = states('sensor.hot_tub_month_cost') | float(0) / 100 %}
            Total: {{ total | round(2) }} kWh, GBP{{ cost | round(2) }}
            Cheap: {{ cheap | round(2) }} kWh, Solar: {{ solar | round(2) }} kWh
            Peak: {{ peak | round(2) }} kWh, Standard: {{ std | round(2) }} kWh
          data:
            push:
              sound: default
            url: /local/hottub/dashboard.html
    mode: single
